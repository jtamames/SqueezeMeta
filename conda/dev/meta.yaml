{% set name = "squeezemeta-dev" %}
{% set version_match = load_file_regex(config = None,
                                       load_file = "../../VERSION",
                                       regex_pattern = '^[^,]*',
                                       from_recipe_dir = True,
                                       recipe_dir = 'master') %}
{% set version = version_match[0] %}
{% set py_version = "3.12.11" %}
{% set pl_version = "5.32.1" %}
{% set r_version = "4.4.3" %}
{% set git_tag = "develop" %}

package:
  name: {{ name|lower }}
  version: {{ version }}
source:
  git_url: https://github.com/jtamames/squeezemeta.git
  git_tag: {{ git_tag }}
outputs:
